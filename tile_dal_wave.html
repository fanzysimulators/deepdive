<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tile-dal Wave</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet" />
  <style>
    :root{
      --navy:#021c29;
      --teal:#3c7a89;
      --parchment:#f1e4c6;
      --gold:#c9a444;
      --dark-gold:#8a6728;
      --danger:rgba(255,50,50,0.45);
    }
    html,body{height:100%;margin:0;padding:0}
    body{
      font-family:'Pirata One',serif;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 45%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 42%),
        radial-gradient(circle at 50% 50%, rgba(247,244,230,0.55) 0%, rgba(224,210,182,0.72) 60%, rgba(196,170,130,1) 100%),
        linear-gradient(120deg, var(--navy) 0%, var(--teal) 100%);
      background-blend-mode:screen,screen,multiply,normal;
      color:var(--parchment);
      overflow:hidden;touch-action:pan-y;
      user-select:none;
      -webkit-user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    *{box-sizing:border-box}
    #game-container{position:relative;width:100%;height:100%;overflow:hidden}

    /* Background image layer (put your PNG in the same folder as this HTML)
       File name used below: ocean_pirate_bg.png */
    #bg-photo{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 15%, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0) 55%),
        radial-gradient(circle at 80% 25%, rgba(0,0,0,0.14) 0%, rgba(0,0,0,0) 52%),
        url('ocean_pirate_bg.png');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      filter:saturate(1.05) contrast(1.02);
      opacity:0.92;
      transform:translate3d(0,0,0);
    }

    /* subtle animated nautical overlay */
    #bg{
      position:absolute;inset:-10%;z-index:1;pointer-events:none;
      opacity:0.40;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.10), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 18% 78%, rgba(201,164,68,0.10), rgba(201,164,68,0) 52%),
        radial-gradient(circle at 82% 22%, rgba(201,164,68,0.08), rgba(201,164,68,0) 52%);
      filter:saturate(1.05) contrast(1.02);
      transform:translate3d(0,0,0);
      animation:bgDrift 10s ease-in-out infinite;
    }
    @keyframes bgDrift{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(10px,-8px,0)}}

    .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .45s ease, transform .45s ease;z-index:2;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding:18px 12px;touch-action:pan-y}
    .hidden{opacity:0;pointer-events:none;transform:translate3d(0,8px,0)}

    #splash-screen{gap:18px}
    #logo-wrap{width:min(92vw,720px);display:flex;align-items:center;justify-content:center;transform:translate3d(0,-18px,0);opacity:0;animation:logoIn .85s cubic-bezier(.2,.9,.2,1) forwards}
    @keyframes logoIn{to{transform:translate3d(0,0,0);opacity:1}}
    #logo-canvas{width:100%;height:140px;pointer-events:none}

    #rules-container{width:min(92vw,820px)}
    #rules-card{
      position:relative;
      width:100%;
      min-height:340px;
      padding:18px 18px 16px;
      background:linear-gradient(180deg, rgba(0,0,0,0.58), rgba(0,0,0,0.30));
      border-radius:14px;
      border:1px solid rgba(255,231,175,0.18);
      backdrop-filter: blur(2px);
      box-shadow:0 22px 54px rgba(0,0,0,0.42);
      overflow:hidden;
    }
    #rules-card::after{
      content:"";
      position:absolute;inset:-2px;
      border-radius:16px;
      padding:2px;
      background:linear-gradient(135deg, rgba(201,164,68,0.95), rgba(255,231,175,0.55), rgba(138,103,40,0.92));
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      filter:drop-shadow(0 0 10px rgba(201,164,68,0.25));
    }
    #rules-canvas{display:block;width:100%;height:auto;pointer-events:none}

    .btn{
      border:none;border-radius:12px;padding:10px 18px;cursor:pointer;
      background:radial-gradient(circle at 50% 35%, rgba(255,231,175,0.95) 0%, rgba(201,164,68,0.92) 42%, rgba(138,103,40,0.95) 100%);
      box-shadow:0 16px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
      transform:translate3d(0,0,0);
      transition:transform .15s ease, filter .15s ease;
      touch-action:manipulation;
    }
    .btn:active{transform:translate3d(0,1px,0) scale(0.98);filter:brightness(0.98)}
    #start-text-canvas,#tryagain-text-canvas{display:block;width:220px;height:42px;pointer-events:none}

    /* Ensure CLEAR label stays inside the CLEAR button */
    #clear-btn{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:0}
    #clear-text-canvas{display:block;width:100%;height:100%;pointer-events:none}

    #countdown-screen{background:rgba(0,0,0,0.62)}
    #countdown-canvas{width:220px;height:220px;pointer-events:none}

    #hud{
      position:absolute;
      top:14px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:6;
      width:min(92vw,560px);
      gap:6px;
      padding:10px 12px;
      border-radius:16px;
      background:linear-gradient(180deg, rgba(0,0,0,0.46), rgba(0,0,0,0.22));
      box-shadow:0 14px 34px rgba(0,0,0,0.38);
      border:1px solid rgba(255,231,175,0.18);
      backdrop-filter: blur(2px);
    }
    #hud-canvas{width:100%;height:56px;pointer-events:none}
    #round-canvas{width:min(92vw,360px);height:42px;pointer-events:none}

    #play-area{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:128px}

    #buttons-wrap{
      width:min(92vw,780px);
      border-radius:16px;
      border:1px solid rgba(255,231,175,0.16);
      backdrop-filter: blur(2px);
      padding:12px 12px;
      background:linear-gradient(180deg, rgba(0,0,0,0.52), rgba(0,0,0,0.26));
      box-shadow:0 22px 56px rgba(0,0,0,0.40), inset 0 1px 0 rgba(255,255,255,0.12);
      position:relative;
      overflow:hidden;
    }
    #buttons-wrap::before{
      content:"";
      position:absolute;inset:-2px;
      border-radius:18px;
      padding:2px;
      background:linear-gradient(135deg, rgba(201,164,68,0.95), rgba(255,231,175,0.55), rgba(138,103,40,0.92));
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      opacity:0.95;
    }
    #buttons-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;position:relative;z-index:1}

    .emoji-btn{
      width:56px;height:56px;border-radius:14px;
      border:1px solid rgba(255,231,175,0.55);
      background:linear-gradient(180deg, rgba(0,0,0,0.58), rgba(0,0,0,0.30));
      box-shadow:0 10px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.16);
      font-size:30px;
      cursor:default;
      color:var(--parchment);
      user-select:none;
      text-shadow:0 2px 10px rgba(0,0,0,0.65);
      filter:drop-shadow(0 2px 6px rgba(0,0,0,0.35));
    }

    #field-window{
      width:min(92vw,780px);
      height:min(52vh,420px);
      min-height:300px;
      border-radius:16px;
      border:1px solid rgba(255,231,175,0.16);
      backdrop-filter: blur(2px);
      background:linear-gradient(180deg, rgba(0,0,0,0.54), rgba(0,0,0,0.24));
      box-shadow:0 22px 56px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.14);
      overflow:hidden;
      position:relative;
    }
    #field-window::before{
      content:"";
      position:absolute;inset:-2px;
      border-radius:18px;
      padding:2px;
      background:repeating-linear-gradient(45deg, rgba(255,231,175,0.72) 0 10px, rgba(130,92,22,0.82) 10px 20px);
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      filter:drop-shadow(0 0 14px rgba(201,164,68,0.20));
    }

    .field-emoji{
      position:absolute;
      font-size:44px;
      line-height:1;
      cursor:pointer;
      transform:translate3d(0,0,0);
      will-change:transform;
      user-select:none;
      -webkit-user-select:none;
      text-shadow:0 3px 10px rgba(0,0,0,0.60);
    }
    .field-emoji:active{transform:translate3d(0,1px,0) scale(0.98)}
    .unique{
      z-index:5;
    }

    #gameover-screen{background:rgba(0,0,0,0.70);gap:14px}
    #final-heading-img{width:min(92vw,720px);height:112px;pointer-events:none}
    #final-time-canvas{width:min(92vw,520px);height:72px;pointer-events:none}

    #flash-overlay{position:absolute;inset:0;pointer-events:none;z-index:20;opacity:0;transition:opacity .35s ease;background:radial-gradient(circle at center, var(--danger) 0%, rgba(255,0,0,0) 62%)}

    @keyframes shake{0%,100%{transform:translate3d(0,0,0)}20%{transform:translate3d(-6px,0,0)}40%{transform:translate3d(6px,0,0)}60%{transform:translate3d(-5px,0,0)}80%{transform:translate3d(5px,0,0)}}
    .shake{animation:shake .32s ease-in-out}

    @media (max-width: 600px){
      #logo-canvas{height:112px}
      #hud{top:12px}
      #hud-canvas{height:52px}
      #round-canvas{height:38px}
      #play-area{padding-top:118px}
      .field-emoji{font-size:40px}
      .emoji-btn{width:52px;height:52px;font-size:28px;border-radius:13px}
      /* Mobile layout fixes */
      #splash-screen, #game-screen{justify-content:flex-start}
      #rules-card{min-height:0;height:min(40vh,240px);padding:12px 12px 10px;overflow:auto;}
      #rules-canvas{height:100% !important; width:100% !important;}
      #start-btn{margin-top:10px}
      #boards{width:min(96vw, 860px)}
      .board-label-canvas{height:38px}
      .board{padding:10px;gap:5px}
      #ref-board{max-width:320px;width:100%;margin:0 auto}
      #deck-board{max-width:92vw;width:100%;margin:0 auto}
      #controls-row{justify-content:center}
      .btn.btn-small{width:160px;height:52px;border-radius:16px}
      #play-area{padding-top:108px;padding-bottom:24px}

    }

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  

    /* -------- Sticky Situation boards -------- */
    #boards{
      width:min(92vw, 860px);
      display:grid;
      grid-template-columns: 1fr 1.35fr;
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 720px){
      #boards{grid-template-columns: 1fr; gap: 12px;}
    }

    .board-col{display:flex;flex-direction:column;gap:10px;align-items:stretch}
    .board-label-canvas{width:100%;height:44px;pointer-events:none}

    .board{
      display:grid;
      gap: 6px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,231,175,0.16);
      backdrop-filter: blur(2px);
      background:linear-gradient(180deg, rgba(0,0,0,0.54), rgba(0,0,0,0.24));
      box-shadow:0 22px 56px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.14);
      position:relative;
      overflow:hidden;
    }
    .board::before{
      content:"";
      position:absolute;inset:-2px;
      border-radius:18px;
      padding:2px;
      background:linear-gradient(135deg, rgba(201,164,68,0.95), rgba(255,231,175,0.55), rgba(138,103,40,0.92));
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      opacity:0.85;
    }
    .tile{
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      border: 1px solid rgba(255,231,175,0.30);
      background: rgba(0,0,0,0.25);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
      user-select:none;
    }
    .board--deck .tile{cursor:pointer}
    .tile.on{
      background: rgba(201,164,68,0.78);
      box-shadow: inset 0 0 0 2px rgba(255,231,175,0.35), 0 10px 20px rgba(0,0,0,0.18);
      transform: translate3d(0, -0.5px, 0);
    }
        #deck-board.locked{filter: saturate(0.92) brightness(0.9);}
    #controls-row{display:flex;justify-content:flex-end}
    .btn.btn-small{width:180px;height:56px;border-radius:16px}

  </style>
</head>
<body>
  <div id="game-container">
    <div id="bg-photo" aria-hidden="true"></div>
    <div id="bg" aria-hidden="true"></div>
    <div id="flash-overlay" aria-hidden="true"></div>

    <div id="splash-screen" class="screen">
      <div id="logo-wrap">
        <canvas id="logo-canvas" aria-hidden="true"></canvas>
      </div>

      <div id="rules-container">
        <div id="rules-card">
          <canvas id="rules-canvas" aria-hidden="true"></canvas>
        </div>
      </div>

      <button id="start-btn" class="btn" aria-label="Start game">
        <canvas id="start-text-canvas" aria-hidden="true"></canvas>
      </button>

      <div class="sr-only" aria-live="polite" id="sr-status">Tile-dal Wave</div>
    </div>

    <div id="countdown-screen" class="screen hidden">
      <canvas id="countdown-canvas" aria-hidden="true"></canvas>
    </div>

    <div id="game-screen" class="screen hidden">
      <div id="hud">
        <canvas id="hud-canvas" aria-hidden="true"></canvas>
        <canvas id="round-canvas" aria-hidden="true"></canvas>
      </div>

      <div id="play-area">
        <div id="boards" aria-label="Pattern boards">
          <div class="board-col">
            <canvas id="ref-label-canvas" class="board-label-canvas" aria-hidden="true"></canvas>
            <div id="ref-board" class="board board--ref" aria-label="Reference board"></div>
          </div>

          <div class="board-col">
            <canvas id="deck-label-canvas" class="board-label-canvas" aria-hidden="true"></canvas>
            <div id="deck-board" class="board board--deck" role="group" aria-label="Your board"></div>

            <div id="controls-row">
              <button id="clear-btn" class="btn btn-small" aria-label="Clear your board">
                <canvas id="clear-text-canvas" aria-hidden="true"></canvas>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="gameover-screen" class="screen hidden">
      <canvas id="final-heading-img" aria-hidden="true"></canvas>
      <canvas id="final-time-canvas" aria-hidden="true"></canvas>
      <button id="restart-btn" class="btn" aria-label="Play again">
        <canvas id="tryagain-text-canvas" aria-hidden="true"></canvas>
      </button>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const GAME_NAME = 'Tile-dal Wave';
    const TOTAL_ROUNDS = 15;

    const GRID_N = 8;

    const MIN_WRONG_PENALTY_MS = 1500;
    const MAX_WRONG_PENALTY_MS = 3500;
    const MIN_LOCK_MS = 320;
    const MAX_LOCK_MS = 650;

    let gameState = 'splash';
    let round = 1;
    let penaltyMs = 0;
    let startPerf = 0;
    let raf = 0;

    let solution = new Set();
    let playerOn = new Set();

    function roundT(roundIdx){
      return (TOTAL_ROUNDS <= 1) ? 1 : (roundIdx - 1) / (TOTAL_ROUNDS - 1);
    }
    function wrongPenaltyMs(roundIdx){
      const t = roundT(roundIdx);
      return Math.round(MIN_WRONG_PENALTY_MS + (MAX_WRONG_PENALTY_MS - MIN_WRONG_PENALTY_MS) * Math.pow(t, 1.55));
    }
    function lockMs(roundIdx){
      const t = roundT(roundIdx);
      return Math.round(MIN_LOCK_MS + (MAX_LOCK_MS - MIN_LOCK_MS) * Math.pow(t, 1.35));
    }
    
    const $ = (id) => document.getElementById(id);

    const dpr = () => Math.max(1, Math.min(3, window.devicePixelRatio || 1));

    function draw3DText(ctx, text, x, y, opt){
      const o = opt || {};
      const font = o.font || '48px "Pirata One", serif';
      const depth = Number.isFinite(o.depth) ? o.depth : 4;
      const topColor = o.topColor || 'rgb(245,230,200)';
      const shadowColor = o.shadowColor || 'rgb(70,50,30)';
      const outline = o.outline || 'rgba(0,0,0,0.35)';

      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = font;

      for(let i = depth; i >= 1; i--){
        ctx.fillStyle = shadowColor;
        ctx.fillText(text, x + i, y + i);
      }

      ctx.lineWidth = 6;
      ctx.strokeStyle = outline;
      ctx.strokeText(text, x, y);

      ctx.fillStyle = topColor;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function wrapLines(ctx, text, maxWidth){
      const words = text.split(/\s+/g);
      const lines = [];
      let cur = '';
      for(const w of words){
        const test = cur ? (cur + ' ' + w) : w;
        if(ctx.measureText(test).width <= maxWidth){
          cur = test;
        }else{
          if(cur) lines.push(cur);
          cur = w;
        }
      }
      if(cur) lines.push(cur);
      return lines;
    }

    function fitCanvas(canvas){
      const ratio = dpr();
      const w = Math.max(1, Math.floor(canvas.clientWidth * ratio));
      const h = Math.max(1, Math.floor(canvas.clientHeight * ratio));
      if(canvas.width !== w) canvas.width = w;
      if(canvas.height !== h) canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      return ctx;
    }

    function formatTime(seconds){
      const s = Math.max(0, seconds);
      const m = Math.floor(s / 60);
      const r = Math.floor(s % 60);
      const ms = Math.floor((s - Math.floor(s)) * 1000);
      const mm = String(m).padStart(2,'0');
      const rr = String(r).padStart(2,'0');
      const mmm = String(ms).padStart(3,'0');
      return `${mm}:${rr}.${mmm}`;
    }

    function showScreen(id){
      for(const el of document.querySelectorAll('.screen')){
        el.classList.add('hidden');
      }
      $(id).classList.remove('hidden');
    }

    function flashRed(){
      const o = $('flash-overlay');
      o.style.background = 'radial-gradient(circle at center, var(--danger) 0%, rgba(255,0,0,0) 62%)';
      o.style.opacity = '1';
      setTimeout(() => { o.style.opacity = '0'; }, 190);
    }

    function flashGood(){
      const o = $('flash-overlay');
      o.style.background = 'radial-gradient(circle at center, rgba(60, 200, 140, 0.40) 0%, rgba(0,255,0,0) 62%)';
      o.style.opacity = '1';
      setTimeout(() => { o.style.opacity = '0'; }, 210);
    }

    let rngState = (Date.now() ^ (Math.random() * 0xFFFFFFFF)) >>> 0;
    function randomU32(){

      let x = rngState >>> 0;
      x ^= x << 13; x >>>= 0;
      x ^= x >>> 17; x >>>= 0;
      x ^= x << 5;  x >>>= 0;
      rngState = x;
      return x >>> 0;
    }
    function randInt(min, max){
      return min + (randomU32() % (max - min + 1));
    }

    function nowSec(){
      if(!startPerf) return 0;
      const t = performance.now() - startPerf + penaltyMs;
      return t / 1000;
    }

    function renderStaticImages(){
      const logoC = $('logo-canvas');
      const logoCtx = fitCanvas(logoC);
      logoCtx.clearRect(0,0,logoC.clientWidth,logoC.clientHeight);
      draw3DText(logoCtx, GAME_NAME, logoC.clientWidth/2, logoC.clientHeight/2, {
        font:'70px "Pirata One", serif', depth:7,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const rulesCanvas = $('rules-canvas');
      const card = $('rules-card');

      const contentW = Math.max(240, card.clientWidth - 36);
      const pad = 14;
      const maxTextW = contentW - pad*2;

      const rulesCtx = rulesCanvas.getContext('2d');

      const title = 'Instructions';
      const paragraphs = [
        'A reference board shows a pattern. Your 8×8 deck board must match it exactly.',
        'Patterns grow gradually harder each round.',
        `Penalty: wrong tiles add time.`,
        `Win Condition: correctly replicate ${TOTAL_ROUNDS} patterns.`
      ];

      rulesCtx.setTransform(1,0,0,1,0,0);
      rulesCtx.textAlign = 'center';
      rulesCtx.textBaseline = 'top';

            const isNarrow = window.innerWidth <= 520;
      const titleSize = isNarrow ? 34 : 42;
      const bodySize  = isNarrow ? 18 : 24;

      rulesCtx.font = `${titleSize}px "Pirata One", serif`;
      const titleH = isNarrow ? 48 : 58;

      rulesCtx.font = `${bodySize}px "Pirata One", serif`;
      const lineH = isNarrow ? 22 : 28;
      const paraGap = isNarrow ? 10 : 14;

      let y = isNarrow ? 64 : 78;
      for(const p of paragraphs){
        const lines = wrapLines(rulesCtx, p, maxTextW);
        y += lines.length * lineH + paraGap;
      }
      const neededH = Math.max(isNarrow ? 210 : 260, y + 14);

      const ratio = dpr();
      rulesCanvas.width = Math.floor(contentW * ratio);
      rulesCanvas.height = Math.floor(neededH * ratio);
      rulesCanvas.style.width = contentW + 'px';
      rulesCanvas.style.height = neededH + 'px';
      rulesCanvas.style.display = 'block';
      rulesCanvas.style.margin = '0 auto';

      rulesCtx.setTransform(ratio,0,0,ratio,0,0);
      rulesCtx.clearRect(0,0,contentW,neededH);

      rulesCtx.textAlign = 'center';
      rulesCtx.textBaseline = 'top';

            rulesCtx.font = `${titleSize}px "Pirata One", serif`;
      rulesCtx.fillStyle = 'rgba(255,231,175,0.95)';
      rulesCtx.shadowColor = 'rgba(0,0,0,0.55)';
      rulesCtx.shadowBlur = 10;
      rulesCtx.fillText(title, contentW/2, 16);

      rulesCtx.shadowBlur = 0;
            rulesCtx.font = `${bodySize}px "Pirata One", serif`;
      rulesCtx.fillStyle = 'rgba(241,228,198,0.98)';

      y = isNarrow ? 64 : 78;
      for(const p of paragraphs){
        const lines = wrapLines(rulesCtx, p, maxTextW);
        for(const line of lines){
          rulesCtx.fillText(line, contentW/2, y);
          y += lineH;
        }
        y += paraGap;
      }

      const startC = $('start-text-canvas');
      const startCtx = fitCanvas(startC);
      startCtx.clearRect(0,0,startC.clientWidth,startC.clientHeight);
      draw3DText(startCtx,'START', startC.clientWidth/2, startC.clientHeight/2, {
        font:'38px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const finalC = $('final-heading-img');
      const finalCtx = fitCanvas(finalC);
      finalCtx.clearRect(0,0,finalC.clientWidth,finalC.clientHeight);
      draw3DText(finalCtx,'FINAL TIME', finalC.clientWidth/2, finalC.clientHeight/2, {
        font:'66px "Pirata One", serif', depth:6,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const tryC = $('tryagain-text-canvas');
      const tryCtx = fitCanvas(tryC);
      tryCtx.clearRect(0,0,tryC.clientWidth,tryC.clientHeight);
      draw3DText(tryCtx,'PLAY AGAIN', tryC.clientWidth/2, tryC.clientHeight/2, {
        font:'38px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const refLabel = $('ref-label-canvas');
      const refCtx = fitCanvas(refLabel);
      refCtx.clearRect(0,0,refLabel.clientWidth,refLabel.clientHeight);
      draw3DText(refCtx,'REFERENCE', refLabel.clientWidth/2, refLabel.clientHeight/2, {
        font:'34px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const deckLabel = $('deck-label-canvas');
      const deckCtx = fitCanvas(deckLabel);
      deckCtx.clearRect(0,0,deckLabel.clientWidth,deckLabel.clientHeight);
      draw3DText(deckCtx,'YOUR DECK', deckLabel.clientWidth/2, deckLabel.clientHeight/2, {
        font:'34px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const clearC = $('clear-text-canvas');
      const clearCtx = fitCanvas(clearC);
      clearCtx.clearRect(0,0,clearC.clientWidth,clearC.clientHeight);
      draw3DText(clearCtx,'CLEAR', clearC.clientWidth/2, clearC.clientHeight/2, {
        font:'34px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });
    }

    function updateHudCanvas(){
      const c = $('hud-canvas');
      const ctx = fitCanvas(c);
      ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
      draw3DText(ctx, `Time: ${formatTime(nowSec())}`, c.clientWidth/2, c.clientHeight/2, {
        font:'34px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });
    }

    function updateRoundCanvas(){
      const c = $('round-canvas');
      const ctx = fitCanvas(c);
      ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
      draw3DText(ctx, `Pattern ${round}/${TOTAL_ROUNDS}`, c.clientWidth/2, c.clientHeight/2, {
        font:'32px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });
    }

    function updateFinalTimeCanvas(finalSeconds){
      const c = $('final-time-canvas');
      const ctx = fitCanvas(c);
      ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
      draw3DText(ctx, formatTime(finalSeconds), c.clientWidth/2, c.clientHeight/2, {
        font:'74px "Pirata One", serif', depth:5,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });
    }

    function buildBoards(){
      const ref = $('ref-board');
      const deck = $('deck-board');

      ref.style.gridTemplateColumns = `repeat(${GRID_N}, 1fr)`;
      deck.style.gridTemplateColumns = `repeat(${GRID_N}, 1fr)`;

      ref.innerHTML = '';
      deck.innerHTML = '';

      for(let y=0; y<GRID_N; y++){
        for(let x=0; x<GRID_N; x++){
          const d = document.createElement('div');
          d.className = 'tile';
          d.dataset.xy = `${x},${y}`;
          ref.appendChild(d);
        }
      }

      for(let y=0; y<GRID_N; y++){
        for(let x=0; x<GRID_N; x++){
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'tile';
          b.dataset.xy = `${x},${y}`;
          b.setAttribute('aria-label', `Tile ${x+1}, ${y+1}`);
          b.addEventListener('click', onDeckTileClick);
          deck.appendChild(b);
        }
      }
    }

    function lockBoard(ms){
      const deck = $('deck-board');
      deck.classList.add('locked');

      for(const b of deck.querySelectorAll('button')){
        b.disabled = true;
      }

      window.setTimeout(() => {
        deck.classList.remove('locked');
        for(const b of deck.querySelectorAll('button')){
          b.disabled = false;
        }
      }, ms);
    }

    function renderReference(){
      const ref = $('ref-board');
      for(const t of ref.querySelectorAll('.tile')){
        const xy = t.dataset.xy;
        t.classList.toggle('on', refVisible && solution.has(xy));
      }
    }

    function renderDeck(){
      const deck = $('deck-board');
      for(const b of deck.querySelectorAll('button.tile')){
        const xy = b.dataset.xy;
        b.classList.toggle('on', playerOn.has(xy));
      }
    }

    function clearDeck(){
      playerOn.clear();
      renderDeck();
      $('sr-status').textContent = 'Deck cleared.';
    }

    function keyXY(x,y){ return `${x},${y}`; }
    function parseXY(k){
      const [x,y] = k.split(',').map(Number);
      return {x,y};
    }

    let refVisible = true;
    let refHideTimer = 0;

    function setReferenceVisible(v){
      refVisible = v;
      renderReference();
    }

    function scheduleHideReference(roundIdx){
      if(refHideTimer) clearTimeout(refHideTimer);
      setReferenceVisible(true);
    }

    function normalizePoints(points){
      let minX = Infinity, minY = Infinity;
      for(const p of points){
        if(p.x < minX) minX = p.x;
        if(p.y < minY) minY = p.y;
      }
      return points.map(p => ({x: p.x - minX, y: p.y - minY}));
    }

    function bbox(points){
      let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      for(const p of points){
        if(p.x<minX) minX=p.x;
        if(p.y<minY) minY=p.y;
        if(p.x>maxX) maxX=p.x;
        if(p.y>maxY) maxY=p.y;
      }
      return {minX,minY,maxX,maxY, w: maxX-minX+1, h: maxY-minY+1};
    }

    function rotate90(points){
      const out = points.map(p => ({x: p.y, y: -p.x}));
      return normalizePoints(out);
    }

    function mirrorH(points){
      const out = points.map(p => ({x: -p.x, y: p.y}));
      return normalizePoints(out);
    }

    function genConnectedShape(cellCount){
      const MAX_ATTEMPTS = 900;

      for(let attempt=0; attempt<MAX_ATTEMPTS; attempt++){
        const pts = [{x:0,y:0}];
        const used = new Set([keyXY(0,0)]);

        let minX=0, maxX=0, minY=0, maxY=0;

        let guard = 0;
        while(pts.length < cellCount && guard++ < 12000){
          const base = pts[randInt(0, pts.length-1)];
          const dir = randInt(0,3);
          const nx = base.x + (dir===0?1:dir===1?-1:0);
          const ny = base.y + (dir===2?1:dir===3?-1:0);
          const k = keyXY(nx,ny);
          if(used.has(k)) continue;

          const tMinX = Math.min(minX, nx);
          const tMaxX = Math.max(maxX, nx);
          const tMinY = Math.min(minY, ny);
          const tMaxY = Math.max(maxY, ny);

          const w = tMaxX - tMinX + 1;
          const h = tMaxY - tMinY + 1;

          if(w > GRID_N || h > GRID_N) continue;

          pts.push({x:nx,y:ny});
          used.add(k);
          minX=tMinX; maxX=tMaxX; minY=tMinY; maxY=tMaxY;
        }

        if(pts.length === cellCount){
          return normalizePoints(pts);
        }
      }

      const out = [];
      for(let y=0; y<GRID_N && out.length<cellCount; y++){
        for(let x=0; x<GRID_N && out.length<cellCount; x++){
          out.push({x,y});
        }
      }
      return out;
    }

    function splitCounts(total, parts){
      const out = new Array(parts).fill(1);
      for(let i=0;i<total-parts;i++){
        out[randInt(0, parts-1)]++;
      }
      if(total >= parts * 2){
        for(let i=0;i<parts;i++){
          if(out[i] === 1){
            let j = 0;
            for(let k=1;k<parts;k++) if(out[k] > out[j]) j = k;
            if(out[j] > 2){
              out[j]--;
              out[i]++;
            }
          }
        }
      }
      return out;
    }

    function hasOrthoNeighbor(x,y, set){
      return set.has(keyXY(x+1,y)) || set.has(keyXY(x-1,y)) || set.has(keyXY(x,y+1)) || set.has(keyXY(x,y-1));
    }

    function tryPlaceCluster(localPts, occupied, enforceGap){
      const bb = bbox(localPts);
      const MAX = 700;
      for(let attempt=0; attempt<MAX; attempt++){
        const offX = randInt(0, GRID_N - bb.w);
        const offY = randInt(0, GRID_N - bb.h);

        let ok = true;
        const placed = [];
        for(const p of localPts){
          const x = p.x + offX;
          const y = p.y + offY;
          const k = keyXY(x,y);
          if(occupied.has(k)){ ok = false; break; }
          if(enforceGap && hasOrthoNeighbor(x,y, occupied)){ ok = false; break; }
          placed.push({x,y,k});
        }
        if(!ok) continue;

        for(const q of placed) occupied.add(q.k);
        return placed.map(q => ({x:q.x,y:q.y}));
      }
      return null;
    }

    function maybeTransformPoints(points, t){
      let pts = points;

      if(t >= 0.25){
        const turns = randInt(0,3);
        for(let i=0;i<turns;i++) pts = rotate90(pts);
      }

      if(t >= 0.55 && (randomU32() % 100) < 55){
        pts = mirrorH(pts);
      }

      return pts;
    }

    
    function chebDist(a,b){
      return Math.max(Math.abs(a.x-b.x), Math.abs(a.y-b.y));
    }

    function quadrantOf(x,y){
      const hx = (x < GRID_N/2) ? 0 : 1;
      const hy = (y < GRID_N/2) ? 0 : 2;
      return hx + hy;
    }

    function pickScatteredCells(targetCount, t){
      const pts = [];
      const occ = new Set();

      const minDistStart = 3;
      const minDistEnd   = 1;
      let minDist = Math.max(1, Math.round(minDistStart + (minDistEnd - minDistStart) * t));

      let allowAdjProb = 0.06 + 0.18 * t;

      function okSpacing(x,y){
        const cand = {x,y};
        for(const p of pts){
          if(chebDist(cand, p) < minDist) return false;
        }
        return true;
      }

      function okAdjacency(x,y){
        if((randomU32() % 10000) / 10000 < allowAdjProb) return true;
        return !hasOrthoNeighbor(x,y, occ);
      }

      const wantQuadrants = (targetCount >= 6) ? 4 : (targetCount >= 4 ? 3 : 0);
      const qUsed = new Set();

      function tryAdd(x,y){
        const k = keyXY(x,y);
        if(occ.has(k)) return false;
        if(!okAdjacency(x,y)) return false;
        if(!okSpacing(x,y)) return false;

        if(qUsed.size < wantQuadrants){
          const q = quadrantOf(x,y);
          if(qUsed.has(q) && (randomU32() % 100) < 65) return false;
        }

        occ.add(k);
        pts.push({x,y});
        qUsed.add(quadrantOf(x,y));
        return true;
      }

      let guard = 0;
      while(pts.length < targetCount && guard++ < 20000){
        const x = randInt(0, GRID_N-1);
        const y = randInt(0, GRID_N-1);
        tryAdd(x,y);

        if(guard === 6000 || guard === 12000 || guard === 17000){
          if(minDist > 1) minDist--;
          allowAdjProb = Math.min(0.40, allowAdjProb + 0.08);
        }
      }

      guard = 0;
      while(pts.length < targetCount && guard++ < 12000){
        const x = randInt(0, GRID_N-1);
        const y = randInt(0, GRID_N-1);
        const k = keyXY(x,y);
        if(occ.has(k)) continue;
        occ.add(k);
        pts.push({x,y});
      }

      return pts;
    }

    function generateRoundPattern(roundIdx){
      const t = roundT(roundIdx);

      const minCells = 3;
      const maxCells = Math.min(GRID_N * GRID_N - 6, 36);
      const cellCount = Math.max(3, Math.round(minCells + (maxCells - minCells) * Math.pow(t, 2.10)));

      const pts = pickScatteredCells(cellCount, t);

      if(t >= 0.75 && pts.length >= 8){
        const tele = 1 + Math.floor((pts.length/18) + t);
        const occ = new Set(pts.map(p => keyXY(p.x,p.y)));
        for(let i=0;i<tele;i++){
          const idx = randInt(0, pts.length-1);
          const from = pts[idx];
          occ.delete(keyXY(from.x, from.y));

          let placed = false;
          for(let attempt=0; attempt<1500 && !placed; attempt++){
            const x = randInt(0, GRID_N-1);
            const y = randInt(0, GRID_N-1);
            const k = keyXY(x,y);
            if(occ.has(k)) continue;

            if(hasOrthoNeighbor(x,y, occ) && (randomU32() % 100) < 85) continue;

            occ.add(k);
            pts[idx] = {x,y};
            placed = true;
          }

          if(!placed){
            const k0 = keyXY(from.x, from.y);
            occ.add(k0);
            pts[idx] = from;
          }
        }
      }

      const sol = new Set();
      for(const p of pts){
        sol.add(keyXY(p.x, p.y));
      }
      return {sol};
    }

    function startRound(roundIdx){
      playerOn.clear();

      const p = generateRoundPattern(roundIdx);
      solution = p.sol;

      renderDeck();
      scheduleHideReference(roundIdx);
    }

    function setsEqual(a,b){
      if(a.size !== b.size) return false;
      for(const v of a) if(!b.has(v)) return false;
      return true;
    }

    function onDeckTileClick(ev){
      if(gameState !== 'playing') return;

      const xy = ev.currentTarget.dataset.xy;

      const willBeOn = !playerOn.has(xy);
      if(willBeOn) playerOn.add(xy);
      else playerOn.delete(xy);

      const shouldBeOn = solution.has(xy);
      const wrong = (willBeOn !== shouldBeOn);

      if(wrong){
        const pen = wrongPenaltyMs(round);
        penaltyMs += pen;

        const deck = $('deck-board');
        deck.classList.add('shake');
        setTimeout(() => deck.classList.remove('shake'), 340);

        flashRed();
        updateHudCanvas();
        lockBoard(lockMs(round));

        $('sr-status').textContent =
          `Wrong tile. ${(pen/1000).toFixed(1)} seconds added. Time ${formatTime(nowSec())}.`;
      }

      renderDeck();

      if(setsEqual(playerOn, solution)){
        flashGood();
        $('sr-status').textContent = `Pattern ${round} matched!`;
        setTimeout(() => nextRound(), 340);
      }
    }

    function tick(){
      if(gameState !== 'playing') return;
      updateHudCanvas();
      raf = requestAnimationFrame(tick);
    }

    function beginCountdown(){
      showScreen('countdown-screen');
      const c = $('countdown-canvas');
      const ctx = fitCanvas(c);

      const steps = ['3','2','1','GO'];
      let i = 0;

      const drawStep = () => {
        ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
        draw3DText(ctx, steps[i], c.clientWidth/2, c.clientHeight/2, {
          font:'120px "Pirata One", serif', depth:8,
          topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
        });
        i++;
        if(i < steps.length){
          setTimeout(drawStep, 650);
        }else{
          setTimeout(startGame, 450);
        }
      };

      drawStep();
    }

    function startGame(){
      gameState = 'playing';
      round = 1;
      penaltyMs = 0;
      startPerf = performance.now();

      showScreen('game-screen');
      startRound(round);
      updateRoundCanvas();
      updateHudCanvas();

      if(raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(tick);

      $('sr-status').textContent = 'Game started. Pattern 1.';
    }

    function endGame(){
      gameState = 'gameover';
      if(raf) cancelAnimationFrame(raf);
      raf = 0;

      const finalSeconds = nowSec();
      showScreen('gameover-screen');
      updateFinalTimeCanvas(finalSeconds);
      $('sr-status').textContent = `Game over. Final time ${formatTime(finalSeconds)}.`;
    }

    function nextRound(){
      if(gameState !== 'playing') return;

      if(round >= TOTAL_ROUNDS){
        endGame();
        return;
      }

      round += 1;
      startRound(round);
      updateRoundCanvas();
      $('sr-status').textContent = `Pattern ${round}.`;
    }

    function boot(){
      renderStaticImages();
      buildBoards();
      updateHudCanvas();
      updateRoundCanvas();
      updateFinalTimeCanvas(0);

      $('start-btn').addEventListener('click', () => {
        if(gameState !== 'splash') return;
        gameState = 'countdown';
        beginCountdown();
      });

      $('restart-btn').addEventListener('click', () => {
        gameState = 'splash';
        showScreen('splash-screen');
        clearDeck();
        $('sr-status').textContent = GAME_NAME;
      });

      $('clear-btn').addEventListener('click', () => {
        if(gameState !== 'playing') return;
        clearDeck();
      });

      const onResize = () => {
        renderStaticImages();
        updateHudCanvas();
        updateRoundCanvas();
        if(gameState === 'playing'){
          buildBoards();
          renderReference();
          renderDeck();
        }
        if(gameState === 'gameover') updateFinalTimeCanvas(nowSec());
      };
      window.addEventListener('resize', onResize);

      const afterFonts = () => {
        renderStaticImages();
        updateHudCanvas();
        updateRoundCanvas();
      };

      if(document.fonts && document.fonts.ready){
        document.fonts.ready.then(afterFonts).catch(afterFonts);
      }else{
        setTimeout(afterFonts, 60);
      }

      showScreen('splash-screen');
    }

    boot();
  })();
  </script>
