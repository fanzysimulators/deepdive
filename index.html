<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deep Dive Duel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet" />
  <style>
    :root{
      --navy:#021c29;
      --teal:#3c7a89;
      --parchment:#f1e4c6;
      --gold:#c9a444;
      --dark-gold:#8a6728;
      --danger:rgba(255,50,50,0.45);
    }
    html,body{height:100%;margin:0;padding:0}
    body{
      font-family:'Pirata One',serif;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 45%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 42%),
        radial-gradient(circle at 50% 50%, rgba(247,244,230,0.55) 0%, rgba(224,210,182,0.72) 60%, rgba(196,170,130,1) 100%),
        linear-gradient(120deg, var(--navy) 0%, var(--teal) 100%);
      background-blend-mode:screen,screen,multiply,normal;
      color:var(--parchment);
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    *{box-sizing:border-box}
    #game-container{position:relative;width:100%;height:100%;overflow:hidden}

    /* Background image layer (put your PNG in the same folder as this HTML)
       File name used below: ocean_pirate_bg.png */
    #bg-photo{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 15%, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0) 55%),
        radial-gradient(circle at 80% 25%, rgba(0,0,0,0.14) 0%, rgba(0,0,0,0) 52%),
        url('ocean_pirate_bg.png');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      filter:saturate(1.05) contrast(1.02);
      opacity:0.92;
      transform:translate3d(0,0,0);
    }

    /* subtle animated nautical overlay */
    #bg{
      position:absolute;inset:-10%;z-index:1;pointer-events:none;
      opacity:0.40;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.10), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 18% 78%, rgba(201,164,68,0.10), rgba(201,164,68,0) 52%),
        radial-gradient(circle at 82% 22%, rgba(201,164,68,0.08), rgba(201,164,68,0) 52%);
      filter:saturate(1.05) contrast(1.02);
      transform:translate3d(0,0,0);
      animation:bgDrift 10s ease-in-out infinite;
    }
    @keyframes bgDrift{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(10px,-8px,0)}}

    .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .45s ease, transform .45s ease;z-index:2}
    .hidden{opacity:0;pointer-events:none;transform:translate3d(0,8px,0)}

    #splash-screen{gap:18px}
    #logo-wrap{width:min(92vw,720px);display:flex;align-items:center;justify-content:center;transform:translate3d(0,-18px,0);opacity:0;animation:logoIn .85s cubic-bezier(.2,.9,.2,1) forwards}
    @keyframes logoIn{to{transform:translate3d(0,0,0);opacity:1}}
    #logo-canvas{width:100%;height:140px;pointer-events:none}

    #rules-container{width:min(92vw,720px)}
    #rules-card{
      position:relative;
      width:100%;
      padding:18px 18px 16px;
      background:linear-gradient(180deg, rgba(0,0,0,0.58), rgba(0,0,0,0.30));
      border-radius:14px;
      border:1px solid rgba(255,231,175,0.18);
      backdrop-filter: blur(2px);
      box-shadow:0 22px 54px rgba(0,0,0,0.42);
      overflow:hidden;
    }
    #rules-card::after{
      content:"";
      position:absolute;inset:-2px;
      border-radius:16px;
      padding:2px;
      background:linear-gradient(135deg, rgba(201,164,68,0.95), rgba(255,231,175,0.55), rgba(138,103,40,0.92));
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      filter:drop-shadow(0 0 10px rgba(201,164,68,0.25));
    }
    #rules-canvas{display:block;width:100%;height:auto;pointer-events:none}

    .btn{
      border:none;border-radius:12px;padding:10px 18px;cursor:pointer;
      background:radial-gradient(circle at 50% 35%, rgba(255,231,175,0.95) 0%, rgba(201,164,68,0.92) 42%, rgba(138,103,40,0.95) 100%);
      box-shadow:0 16px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
      transform:translate3d(0,0,0);
      transition:transform .15s ease, filter .15s ease;
      touch-action:manipulation;
    }
    .btn:active{transform:translate3d(0,1px,0) scale(0.98);filter:brightness(0.98)}
    #start-text-canvas,#tryagain-text-canvas{display:block;width:220px;height:42px;pointer-events:none}

    #countdown-screen{background:rgba(0,0,0,0.62)}
    #countdown-canvas{width:220px;height:220px;pointer-events:none}

    #hud{
      position:absolute;
      top:14px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:6;
      width:min(92vw,560px);
      gap:6px;
      padding:10px 12px;
      border-radius:16px;
      background:linear-gradient(180deg, rgba(0,0,0,0.46), rgba(0,0,0,0.22));
      box-shadow:0 14px 34px rgba(0,0,0,0.38);
      border:1px solid rgba(255,231,175,0.18);
      backdrop-filter: blur(2px);
    }
    #hud-canvas{width:100%;height:56px;pointer-events:none}
    #round-canvas{width:min(92vw,360px);height:42px;pointer-events:none}

    #play-area{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:128px}

    #buttons-wrap{
      width:min(92vw,780px);
      border-radius:16px;
      border:1px solid rgba(255,231,175,0.16);
      backdrop-filter: blur(2px);
      padding:12px 12px;
      background:linear-gradient(180deg, rgba(0,0,0,0.52), rgba(0,0,0,0.26));
      box-shadow:0 22px 56px rgba(0,0,0,0.40), inset 0 1px 0 rgba(255,255,255,0.12);
      position:relative;
      overflow:hidden;
    }
    #buttons-wrap::before{
      content:"";
      position:absolute;inset:-2px;
      border-radius:18px;
      padding:2px;
      background:linear-gradient(135deg, rgba(201,164,68,0.95), rgba(255,231,175,0.55), rgba(138,103,40,0.92));
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      opacity:0.95;
    }
    #buttons-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;position:relative;z-index:1}

    .emoji-btn{
      width:56px;height:56px;border-radius:14px;
      border:1px solid rgba(255,231,175,0.55);
      background:linear-gradient(180deg, rgba(0,0,0,0.58), rgba(0,0,0,0.30));
      box-shadow:0 10px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.16);
      font-size:30px;
      cursor:default;
      color:var(--parchment);
      user-select:none;
      text-shadow:0 2px 10px rgba(0,0,0,0.65);
      filter:drop-shadow(0 2px 6px rgba(0,0,0,0.35));
    }

    #field-window{
      width:min(92vw,780px);
      height:min(52vh,420px);
      min-height:300px;
      border-radius:16px;
      border:1px solid rgba(255,231,175,0.16);
      backdrop-filter: blur(2px);
      background:linear-gradient(180deg, rgba(0,0,0,0.54), rgba(0,0,0,0.24));
      box-shadow:0 22px 56px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.14);
      overflow:hidden;
      position:relative;
    }
    #field-window::before{
      content:"";
      position:absolute;inset:-2px;
      border-radius:18px;
      padding:2px;
      background:repeating-linear-gradient(45deg, rgba(255,231,175,0.72) 0 10px, rgba(130,92,22,0.82) 10px 20px);
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      filter:drop-shadow(0 0 14px rgba(201,164,68,0.20));
    }

    .field-emoji{
      position:absolute;
      font-size:44px;
      line-height:1;
      cursor:pointer;
      transform:translate3d(0,0,0);
      will-change:transform;
      user-select:none;
      -webkit-user-select:none;
      text-shadow:0 3px 10px rgba(0,0,0,0.60);
    }
    .field-emoji:active{transform:translate3d(0,1px,0) scale(0.98)}
    .unique{
      z-index:5;
    }

    #gameover-screen{background:rgba(0,0,0,0.70);gap:14px}
    #final-heading-img{width:min(92vw,720px);height:112px;pointer-events:none}
    #final-time-canvas{width:min(92vw,520px);height:72px;pointer-events:none}

    #flash-overlay{position:absolute;inset:0;pointer-events:none;z-index:20;opacity:0;transition:opacity .35s ease;background:radial-gradient(circle at center, var(--danger) 0%, rgba(255,0,0,0) 62%)}

    @keyframes shake{0%,100%{transform:translate3d(0,0,0)}20%{transform:translate3d(-6px,0,0)}40%{transform:translate3d(6px,0,0)}60%{transform:translate3d(-5px,0,0)}80%{transform:translate3d(5px,0,0)}}
    .shake{animation:shake .32s ease-in-out}

    @media (max-width: 600px){
      #logo-canvas{height:112px}
      #hud{top:12px}
      #hud-canvas{height:52px}
      #round-canvas{height:38px}
      #play-area{padding-top:118px}
      .field-emoji{font-size:40px}
      .emoji-btn{width:52px;height:52px;font-size:28px;border-radius:13px}
    }

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  </style>
</head>
<body>
  <div id="game-container">
    <div id="bg-photo" aria-hidden="true"></div>
    <div id="bg" aria-hidden="true"></div>
    <div id="flash-overlay" aria-hidden="true"></div>

    <div id="splash-screen" class="screen">
      <div id="logo-wrap">
        <canvas id="logo-canvas" aria-hidden="true"></canvas>
      </div>

      <div id="rules-container">
        <div id="rules-card">
          <canvas id="rules-canvas" aria-hidden="true"></canvas>
        </div>
      </div>

      <button id="start-btn" class="btn" aria-label="Start game">
        <canvas id="start-text-canvas" aria-hidden="true"></canvas>
      </button>

      <div class="sr-only" aria-live="polite" id="sr-status">Deep Dive Duel</div>
    </div>

    <div id="countdown-screen" class="screen hidden">
      <canvas id="countdown-canvas" aria-hidden="true"></canvas>
    </div>

    <div id="game-screen" class="screen hidden">
      <div id="hud">
        <canvas id="hud-canvas" aria-hidden="true"></canvas>
        <canvas id="round-canvas" aria-hidden="true"></canvas>
      </div>

      <div id="play-area">
        <div id="buttons-wrap" role="group" aria-label="Emoji buttons">
          <div id="buttons-grid"></div>
        </div>

        <div id="field-window" role="group" aria-label="Emoji field"></div>
      </div>
    </div>

    <div id="gameover-screen" class="screen hidden">
      <canvas id="final-heading-img" aria-hidden="true"></canvas>
      <canvas id="final-time-canvas" aria-hidden="true"></canvas>
      <button id="restart-btn" class="btn" aria-label="Play again">
        <canvas id="tryagain-text-canvas" aria-hidden="true"></canvas>
      </button>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const GAME_NAME = 'Deep Dive Duel';

    // Emoji set (buttons + field spawns)
    // Requested: 🐬 🪼 🫧 🌊 🐋 ⚓
    const EMOJIS = ['🐬','🪼','🫧','🌊','🐋','⚓'];
    const TOTAL_ROUNDS = 15;

    // ---------- canvas helpers ----------
    const dpr = () => Math.max(1, Math.min(3, window.devicePixelRatio || 1));

    function draw3DText(ctx, text, x, y, opt){
      const o = opt || {};
      const font = o.font || '48px "Pirata One", serif';
      const depth = Number.isFinite(o.depth) ? o.depth : 4;
      const topColor = o.topColor || 'rgb(245,230,200)';
      const shadowColor = o.shadowColor || 'rgb(70,50,30)';
      const outline = o.outline || 'rgba(0,0,0,0.35)';
      ctx.font = font;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for(let i=depth;i>0;i--){
        ctx.fillStyle = shadowColor;
        ctx.fillText(text, x+i, y+i);
      }
      ctx.lineWidth = Math.max(1, Math.floor(depth/2));
      ctx.strokeStyle = outline;
      ctx.strokeText(text, x, y);
      ctx.fillStyle = topColor;
      ctx.fillText(text, x, y);
    }

    function wrapLines(ctx, text, maxWidth){
      const words = String(text).replace(/\s+/g,' ').trim().split(' ');
      const lines = [];
      let line = '';
      for(const w of words){
        const test = line ? (line + ' ' + w) : w;
        if(ctx.measureText(test).width <= maxWidth){
          line = test;
        }else{
          if(line) lines.push(line);
          line = w;
        }
      }
      if(line) lines.push(line);
      return lines;
    }

    function fitCanvas(canvas){
      const r = dpr();
      const w = Math.max(1, Math.floor(canvas.clientWidth * r));
      const h = Math.max(1, Math.floor(canvas.clientHeight * r));
      if(canvas.width !== w) canvas.width = w;
      if(canvas.height !== h) canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.setTransform(r, 0, 0, r, 0, 0);
      return ctx;
    }

    function formatTime(sec){
      const s = Math.max(0, Math.floor(sec));
      const m = Math.floor(s / 60);
      const r = String(s % 60).padStart(2, '0');
      return `${m}:${r}`;
    }

    // ---------- ui ----------
    const $ = (id) => document.getElementById(id);

    function showScreen(id){
      const ids = ['splash-screen','countdown-screen','game-screen','gameover-screen'];
      for (const x of ids){
        const el = $(x);
        if(x === id) el.classList.remove('hidden');
        else el.classList.add('hidden');
      }
    }

    function flashRed(){
      const o = $('flash-overlay');
      o.style.opacity = '1';
      setTimeout(() => { o.style.opacity = '0'; }, 190);
    }

    // ---------- randomness ----------
    function randomU32(){
      const a = new Uint32Array(1);
      if (window.crypto && crypto.getRandomValues){ crypto.getRandomValues(a); return a[0]; }
      return Math.floor(Math.random()*0xffffffff);
    }
    function randInt(min, maxIncl){
      const span = (maxIncl - min + 1);
      return min + (randomU32() % span);
    }
    function pickDifferentIndex(prev, n){
      if(n <= 1) return 0;
      let idx = randInt(0, n-1);
      if(idx === prev) idx = (idx + 1 + (randomU32() % (n-1))) % n;
      return idx;
    }

    // ---------- game state (kept inside closure) ----------
    let gameState = 'splash';
    let round = 1;
    let uniqueIdx = -1;
    let prevUniqueIdx = -1;

    let startPerf = 0;
    let penaltyMs = 0;
    let raf = 0;

    function nowSec(){
      if(!startPerf) return 0;
      const t = performance.now() - startPerf + penaltyMs;
      return t / 1000;
    }

    // ---------- drawing ----------
    function renderStaticImages(){
      const logoC = $('logo-canvas');
      const logoCtx = fitCanvas(logoC);
      logoCtx.clearRect(0,0,logoC.clientWidth,logoC.clientHeight);
      draw3DText(logoCtx, GAME_NAME, logoC.clientWidth/2, logoC.clientHeight/2, {
        font:'70px "Pirata One", serif', depth:7,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const rulesCanvas = $('rules-canvas');
      const card = $('rules-card');
      const w = card.clientWidth;
      const pad = 14;
      const maxTextW = w - pad*2;

      const rulesCtx = rulesCanvas.getContext('2d');

      // Compose more formal, centered instructions (canvas-only text)
      const title = 'Instructions';
      const paragraphs = [
        'Welcome to ' + GAME_NAME + '. Your objective is to identify the single symbol that appears only once in each round.',
        'Below the six reference buttons, a window will fill with many symbols. Five symbols will repeat multiple times, but one will be unique.',
        'Select the unique symbol to clear the field and advance to the next round. The challenge lasts for 15 rounds, and each round increases the number of repeated symbols.',
        'Be careful: selecting an incorrect symbol adds a 30-second penalty to your total time. Finish all rounds as quickly and accurately as possible.'
      ];

      // Measure lines first so we can size the canvas to fit the content
      const titleSize = 30;
      const bodySize = 19;
      const lineH = Math.max(22, Math.round(w/28));
      const paraGap = Math.round(lineH * 0.55);

      // Set fonts for measuring
      rulesCtx.setTransform(1,0,0,1,0,0);
      rulesCtx.font = `${bodySize}px "Pirata One", serif`;

      const wrappedParas = paragraphs.map(p => wrapLines(rulesCtx, p, maxTextW));
      const totalBodyLines = wrappedParas.reduce((a,b) => a + b.length, 0);
      const totalH = pad + (titleSize + 10) + 10 + (totalBodyLines * lineH) + ((paragraphs.length - 1) * paraGap) + pad;

      rulesCanvas.style.width = '100%';
      rulesCanvas.width = Math.floor(w * dpr());
      rulesCanvas.height = Math.floor(totalH * dpr());

      rulesCtx.setTransform(dpr(),0,0,dpr(),0,0);
      rulesCtx.clearRect(0,0,w,totalH);

      // Title
      rulesCtx.font = `${titleSize}px "Pirata One", serif`;
      rulesCtx.fillStyle = 'rgba(255,255,255,0.96)';
      rulesCtx.textAlign = 'center';
      rulesCtx.textBaseline = 'top';
      rulesCtx.fillText(title, w/2, pad);

      // Body
      let y = pad + titleSize + 12;
      rulesCtx.font = `${bodySize}px "Pirata One", serif`;
      rulesCtx.fillStyle = 'rgba(255,255,255,0.92)';

      for(let p=0;p<wrappedParas.length;p++){
        const lines = wrappedParas[p];
        for(const line of lines){
          rulesCtx.fillText(line, w/2, y);
          y += lineH;
        }
        if(p !== wrappedParas.length - 1) y += paraGap;
      }

      const startC = $('start-text-canvas');
      const startCtx = fitCanvas(startC);
      startCtx.clearRect(0,0,startC.clientWidth,startC.clientHeight);
      draw3DText(startCtx,'START', startC.clientWidth/2, startC.clientHeight/2, {
        font:'38px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const finalC = $('final-heading-img');
      const finalCtx = fitCanvas(finalC);
      finalCtx.clearRect(0,0,finalC.clientWidth,finalC.clientHeight);
      draw3DText(finalCtx,'FINAL TIME', finalC.clientWidth/2, finalC.clientHeight/2, {
        font:'66px "Pirata One", serif', depth:6,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const tryC = $('tryagain-text-canvas');
      const tryCtx = fitCanvas(tryC);
      tryCtx.clearRect(0,0,tryC.clientWidth,tryC.clientHeight);
      draw3DText(tryCtx,'PLAY AGAIN', tryC.clientWidth/2, tryC.clientHeight/2, {
        font:'34px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });

      const grid = $('buttons-grid');
      grid.innerHTML='';
      for(const e of EMOJIS){
        const b = document.createElement('button');
        b.className='emoji-btn';
        b.type='button';
        b.textContent = e;
        b.setAttribute('aria-label', e);
        b.tabIndex = -1; // decorative
        grid.appendChild(b);
      }
    }

    function updateHudCanvas(){
      const c = $('hud-canvas');
      const ctx = fitCanvas(c);
      ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
      draw3DText(ctx, `Time: ${formatTime(nowSec())}`, c.clientWidth/2, c.clientHeight/2, {
        font:'34px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });
    }

    function updateRoundCanvas(){
      const c = $('round-canvas');
      const ctx = fitCanvas(c);
      ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
      draw3DText(ctx, `Round ${round}/${TOTAL_ROUNDS}`, c.clientWidth/2, c.clientHeight/2, {
        font:'32px "Pirata One", serif', depth:4,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });
    }

    function updateFinalTimeCanvas(finalSeconds){
      const c = $('final-time-canvas');
      const ctx = fitCanvas(c);
      ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
      draw3DText(ctx, formatTime(finalSeconds), c.clientWidth/2, c.clientHeight/2, {
        font:'74px "Pirata One", serif', depth:5,
        topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
      });
    }

    // ---------- emoji field generation ----------
    function clearField(){
      $('field-window').innerHTML = '';
    }

    function buildRoundLayout(){
      const field = $('field-window');
      clearField();

      const w = field.clientWidth;
      const h = field.clientHeight;
      // sizing / spacing
      const box = 52; // rough hitbox
      const pad = 10;
      // Keep overlap "slight" so clicks aren't blocked by a pile-up.
      // (We still allow a little overlap by setting minDist < box.)
      // Higher spacing reduces "unclickable" stacks when two emojis overlap.
      // We still allow a *little* overlap by keeping minDist < box.
      const baseMinDist = 40;

      // More emojis from the start, then ramps up across rounds.
      // We also cap by the available window area so it doesn't become a solid wall on small screens.
      const repeatsWanted = 6 + Math.floor((round - 1) / 2); // Round 1 = 6
      const maxTotalApprox = Math.max(24, Math.floor((w * h) / (baseMinDist * baseMinDist * 1.15)));
      const repeatsCap = Math.max(4, Math.floor((maxTotalApprox - 1) / 5)); // because total ~= 5*repeats + 1
      const repeats = Math.max(4, Math.min(repeatsCap, Math.min(14, repeatsWanted)));

      uniqueIdx = pickDifferentIndex(prevUniqueIdx, EMOJIS.length);
      prevUniqueIdx = uniqueIdx;
      const uniqueEmoji = EMOJIS[uniqueIdx];

      const pool = [];
      for(let i=0;i<EMOJIS.length;i++){
        if(i === uniqueIdx) continue;
        for(let r=0;r<repeats;r++) pool.push(EMOJIS[i]);
      }
      pool.push(uniqueEmoji);

      // shuffle
      for(let i=pool.length-1;i>0;i--){
        const j = randomU32() % (i+1);
        const t = pool[i]; pool[i] = pool[j]; pool[j] = t;
      }

      // placement helpers
      const placed = []; // {x,y}
      const clampX = () => Math.max(pad, w - box - pad);
      const clampY = () => Math.max(pad, h - box - pad);

      function dist(a, b){
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function farFromEdgesScore(x, y){
        const left = x;
        const top = y;
        const right = (w - box) - x;
        const bottom = (h - box) - y;
        return Math.min(left, top, right, bottom);
      }

      // Pick a good unique spot FIRST (so it doesn't get boxed in)
      function chooseUniqueSpot(){
        let best = {x:pad, y:pad, score:-1};
        for(let t=0;t<120;t++){
          const x = randInt(pad, clampX());
          const y = randInt(pad, clampY());
          const score = farFromEdgesScore(x, y);
          if(score > best.score) best = {x, y, score};
          if(score >= 34) return {x,y};
        }
        return {x:best.x, y:best.y};
      }

      const uniqueSpot = chooseUniqueSpot();
      placed.push({x: uniqueSpot.x, y: uniqueSpot.y});

      // Place the rest with rejection sampling + gentle relaxation.
      // Also reserve extra breathing room around the unique emoji.
      const uniqueBuffer = 56;

      function tryPlacePoint(){
        let minDist = baseMinDist;
        for(let attempt=0; attempt<90; attempt++){
          // Gentle relaxation if the field is getting dense.
          if(attempt === 35) minDist = Math.max(36, minDist - 4);
          if(attempt === 60) minDist = Math.max(32, minDist - 4);
          const x = randInt(pad, clampX());
          const y = randInt(pad, clampY());
          const p = {x,y};

          // keep space around unique
          if(dist(p, placed[0]) < uniqueBuffer) continue;

          let ok = true;
          for(const q of placed){
            if(dist(p, q) < minDist){ ok = false; break; }
          }
          if(ok) return p;
        }
        // fallback (still within bounds)
        return {x: randInt(pad, clampX()), y: randInt(pad, clampY())};
      }

      // Create all non-unique emojis
      for(const e of pool){
        if(e === uniqueEmoji) continue;
        const p = tryPlacePoint();
        placed.push(p);

        const el = document.createElement('div');
        el.className = 'field-emoji';
        el.textContent = e;
        el.style.left = `${p.x}px`;
        el.style.top = `${p.y}px`;
        el.dataset.emoji = e;
        el.addEventListener('click', onFieldEmojiClick, {passive:true});
        field.appendChild(el);
      }

      // Add unique last, on top (but NOT highlighted)
      const u = document.createElement('div');
      u.className = 'field-emoji unique';
      u.textContent = uniqueEmoji;
      u.style.left = `${uniqueSpot.x}px`;
      u.style.top = `${uniqueSpot.y}px`;
      u.dataset.emoji = uniqueEmoji;
      u.addEventListener('click', onFieldEmojiClick, {passive:true});
      field.appendChild(u);
    }

    // ---------- game flow ----------
    function tick(){
      if(gameState !== 'playing') return;
      updateHudCanvas();
      raf = requestAnimationFrame(tick);
    }

    function beginCountdown(){
      showScreen('countdown-screen');
      let count = 3;
      const c = $('countdown-canvas');
      const ctx = fitCanvas(c);

      const draw = () => {
        ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
        draw3DText(ctx, String(count), c.clientWidth/2, c.clientHeight/2, {
          font:'140px "Pirata One", serif', depth:6,
          topColor:'rgb(248,235,205)', shadowColor:'rgb(55,38,20)'
        });
      };

      draw();
      const iv = setInterval(() => {
        count -= 1;
        if(count > 0){
          draw();
        }else{
          clearInterval(iv);
          startGame();
        }
      }, 1000);
    }

    function startGame(){
      gameState = 'playing';
      round = 1;
      penaltyMs = 0;
      startPerf = performance.now();
      prevUniqueIdx = -1;

      showScreen('game-screen');
      buildRoundLayout();
      updateRoundCanvas();
      updateHudCanvas();

      if(raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(tick);

      $('sr-status').textContent = 'Game started. Round 1.';
    }

    function endGame(){
      gameState = 'gameover';
      if(raf) cancelAnimationFrame(raf);
      raf = 0;

      const finalSeconds = nowSec();
      showScreen('gameover-screen');
      updateFinalTimeCanvas(finalSeconds);
      $('sr-status').textContent = `Game over. Final time ${formatTime(finalSeconds)}.`;
    }

    function nextRound(){
      if(round >= TOTAL_ROUNDS){
        endGame();
        return;
      }
      round += 1;
      buildRoundLayout();
      updateRoundCanvas();
      $('sr-status').textContent = `Round ${round}.`;
    }

    function onFieldEmojiClick(ev){
      if(gameState !== 'playing') return;

      const clicked = ev.currentTarget.dataset.emoji;
      const target = EMOJIS[uniqueIdx];

      if(clicked === target){
        nextRound();
      }else{
        penaltyMs += 30000;

        const field = $('field-window');
        field.classList.add('shake');
        setTimeout(() => field.classList.remove('shake'), 340);

        flashRed();
        updateHudCanvas();

        $('sr-status').textContent = `Wrong. 30 seconds added. Time ${formatTime(nowSec())}.`;
      }
    }

    // ---------- boot ----------
    function boot(){
      renderStaticImages();
      updateHudCanvas();
      updateRoundCanvas();
      updateFinalTimeCanvas(0);

      $('start-btn').addEventListener('click', () => {
        if(gameState !== 'splash') return;
        gameState = 'countdown';
        beginCountdown();
      });

      $('restart-btn').addEventListener('click', () => {
        gameState = 'splash';
        showScreen('splash-screen');
        clearField();
        $('sr-status').textContent = GAME_NAME;
      });

      const onResize = () => {
        renderStaticImages();
        updateHudCanvas();
        updateRoundCanvas();
        if(gameState === 'playing') buildRoundLayout();
        if(gameState === 'gameover') updateFinalTimeCanvas(nowSec());
      };
      window.addEventListener('resize', onResize);

      const afterFonts = () => {
        renderStaticImages();
        updateHudCanvas();
        updateRoundCanvas();
      };

      if(document.fonts && document.fonts.ready){
        document.fonts.ready.then(afterFonts).catch(afterFonts);
      }else{
        setTimeout(afterFonts, 60);
      }

      showScreen('splash-screen');
    }

    document.addEventListener('DOMContentLoaded', boot);
  })();
  </script>
</body>
</html>
